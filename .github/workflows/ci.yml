name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ts:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Scope to the publishable workspaces. Examples are runnable docs but
      # require env vars (DATABASE_URL, GRAVEL_ADMIN_PASSWORD) at build
      # time, so we don't gate CI on their build.
      - run: pnpm --filter "./packages/*" -r typecheck
      - run: pnpm --filter "./packages/*" -r build
      - run: pnpm --filter "./packages/*" -r test --if-present

  dashboard-e2e:
    name: Dashboard E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The dashboard's Vite dev server mounts the in-process SDK
      # handler via configureServer. That dynamic import resolves
      # `@artanis-ai/gravel` from the workspace, which means the SDK
      # must be built first or every /admin/ai/api/* request falls
      # through to Vite's SPA fallback and returns the index.html
      # shell (E2E tests then fail decoding JSON).
      - name: Build SDK (so dev server can import it)
        run: pnpm --filter @artanis-ai/gravel build
      # Cache Playwright's browser binaries (~150MB) keyed by the
      # @playwright/test version in the dashboard's package.json. Cold
      # runs install ~30s of binaries; cached runs skip that. The
      # `playwright-version` step reads the resolved version out of
      # the lockfile so a bump in package.json automatically misses
      # the cache and refetches.
      - name: Resolve Playwright version
        id: pw-version
        working-directory: packages/dashboard
        run: |
          set -e
          version=$(pnpm exec playwright --version | awk '{print $NF}')
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
      - name: Install Playwright browsers
        working-directory: packages/dashboard
        # On a cache hit the browsers are already on disk so we only
        # need the OS libs (--with-deps installs both, but the browser
        # install is a no-op when binaries are present).
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E suite
        working-directory: packages/dashboard
        env:
          # Playwright's webServer block boots `pnpm dev` automatically;
          # CI flag turns on retries + the GitHub reporter.
          CI: 'true'
        run: pnpm test:e2e
      - name: Run visual baseline suite
        working-directory: packages/dashboard
        env:
          CI: 'true'
        run: pnpm test:visual
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/dashboard/playwright-report
          retention-days: 7
      - name: Upload visual diff on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff
          path: packages/dashboard/test-results
          retention-days: 7

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync deps
        working-directory: python/gravel
        run: uv sync --extra dev --extra fastapi --extra django --extra asgi --extra flask --extra tracing-openai --extra tracing-anthropic --extra tracing-langchain --extra google-genai
      - name: Lint
        working-directory: python/gravel
        run: uv run ruff check src
      - name: Tests
        working-directory: python/gravel
        run: uv run pytest -q
