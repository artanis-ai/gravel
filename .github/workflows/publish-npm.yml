name: Publish TypeScript to npm

# Mirrors the pattern in artanis-ai/sdk: OIDC trusted publishing on tag.
# No tokens stored anywhere — npm validates the GitHub Actions identity.
#
# Setup checklist (one-time, on npm.com):
#   Account → Trusted Publishers → Add → GitHub Actions
#     Repository:        artanis-ai/gravel
#     Workflow filename: publish-npm.yml
#     Environment:       (blank)
#     Package:           @artanis-ai/gravel
#
# Triggered by: pushing a git tag matching v* (e.g. `git tag v0.0.1 && git push --tags`).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-npm:
    name: Publish @artanis-ai/gravel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for OIDC trusted publishing.

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm >= 11.x, which is the version that
          # supports trusted-publisher OIDC (the flow that lets
          # `npm publish --provenance` mint a fresh token from the
          # GH Actions id-token). Node 22's bundled npm 10.x doesn't.
          # In-place `npm install -g npm@latest` corrupts the running
          # npm mid-upgrade, so bumping the Node version is cleaner.
          node-version: 24
          # Intentionally NO `registry-url:` — that injects
          # `_authToken=${NODE_AUTH_TOKEN}` into .npmrc, which makes
          # npm CLI prefer a (stale) NODE_AUTH_TOKEN secret over the
          # OIDC token from the trusted publisher. We want OIDC.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard (used by SDK)
        working-directory: packages/dashboard
        run: pnpm build

      - name: Build SDK
        working-directory: packages/sdk-ts
        run: pnpm build

      - name: Publish
        working-directory: packages/sdk-ts
        # `npm publish --provenance` auto-detects the GH OIDC environment
        # when id-token: write is granted (see permissions block above).
        # No NODE_AUTH_TOKEN needed; the trusted publisher on npmjs.com
        # accepts the OIDC token directly.
        run: npm publish --access public --provenance
