name: Publish Python to PyPI

# Mirrors the pattern in artanis-ai/sdk: OIDC trusted publishing on tag.
# No PyPI token stored — PyPI validates the GitHub Actions identity.
#
# Setup checklist (one-time, on pypi.org):
#   Account → Publishing → Add a new pending publisher
#     PyPI Project Name: artanis-gravel
#     Owner:             artanis-ai
#     Repository name:   gravel
#     Workflow name:     publish-python.yml
#     Environment:       (blank)
#
# Triggered by: pushing a git tag matching v* (same as the npm workflow).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-python:
    name: Publish artanis-gravel
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # The Python wheel bundles the built dashboard SPA at
      # artanis_gravel/_dashboard_dist/ (see python/gravel/pyproject.toml
      # `[tool.hatch.build.targets.wheel.force-include]`). The dist is
      # gitignored, so we have to build it here before invoking
      # `python -m build`. Mirrors the dashboard step in publish-npm.yml.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build dashboard SPA (bundled into the wheel)
        working-directory: packages/dashboard
        run: pnpm build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        run: pip install build

      - name: Build wheel
        working-directory: python/gravel
        # `python -m build` (no flag) builds sdist first, then rebuilds
        # the wheel FROM the sdist in /tmp/. The sdist doesn't include
        # the `../../packages/dashboard/dist` force-include target
        # (relative path resolves to /tmp/packages/...), so the wheel-
        # from-sdist build fails with "Forced include not found".
        # `--wheel` skips the sdist round-trip and builds in-place, so
        # the relative path resolves to the actual dashboard dist that
        # `pnpm build` produced two steps ago.
        run: python -m build --wheel

      - name: Verify dashboard was bundled into the wheel
        # Belt-and-suspenders: if the force-include glob misses the
        # dashboard for any reason (path drift, build order race), fail
        # the publish before it lands on PyPI with a broken wheel.
        working-directory: python/gravel
        run: |
          set -e
          WHEEL=$(ls dist/*.whl)
          python -c "
          import sys, zipfile
          with zipfile.ZipFile('$WHEEL') as z:
              dashboard = [n for n in z.namelist() if '_dashboard_dist/index.html' in n]
              if not dashboard:
                  print('FAIL: dashboard SPA missing from wheel', file=sys.stderr)
                  sys.exit(1)
              print(f'OK: dashboard bundled at {dashboard[0]}')
          "

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/gravel/dist/
